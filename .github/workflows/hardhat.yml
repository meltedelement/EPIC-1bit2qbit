name: Hardhat

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: blockchain/package-lock.json

      - name: Install dependencies
        working-directory: blockchain
        run: npm ci

      - name: Run tests
        working-directory: blockchain
        run: npm test
