[network]
external_host = "https://1bit2qbit.theburkenator.com"
vm_address    = "200.69.13.70"

[services.backend]
internal_port = 8000
host          = "127.0.0.1"

# MySQL via Unix socket auth — no password, OS-level auth.
# Socket path is the Ubuntu default; the API only runs on the team VM.
[services.backend.db]
url = "mysql+pymysql://epic@/epic?unix_socket=/var/run/mysqld/mysqld.sock"

[logging.stdout]
enabled     = true
level       = "DEBUG"
format      = "%(log_color)s%(levelname)-8s%(reset)s %(name)s — %(message)s"
date_format = "%H:%M:%S"

[logging.file]
enabled        = true
level          = "DEBUG"
directory      = "logs"
retention_days = 7
format         = "%(asctime)s %(levelname)-8s %(name)s — %(message)s"
date_format    = "%Y-%m-%d %H:%M:%S"
