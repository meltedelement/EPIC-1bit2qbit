# Handle WebSocket Upgrade header for the /backend/ws endpoint
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen      80;
    server_name 1bit2qbit.theburkenator.com;

    # TLS terminates at the university gateway upstream — traffic from the gateway
    # to this VM is plain HTTP on port 80 by design. HTTPS is enforced and certs
    # are managed at the gateway (Let's Encrypt). Do not configure SSL here.

    # /  — Project report PDF
    location = / {
        root /home/student/EPIC-1bit2qbit/docs;
        try_files /report.pdf =404;
        add_header Content-Type application/pdf;
    }

    # /verify  — Blockchain verification React SPA (built with Vite)
    location /verify/ {
        alias /home/student/EPIC-1bit2qbit/server/web-app/dist/;
        try_files $uri $uri/ /verify/index.html;
    }

    # /backend  — FastAPI message-routing & key-bundle management API
    location /backend/ {
        proxy_pass         http://127.0.0.1:8443/;
        proxy_http_version 1.1;

        # WebSocket upgrade support (required for the /ws endpoint)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        # Hardcoded https — $scheme would always be "http" since TLS terminates upstream
        proxy_set_header X-Forwarded-Proto  https;
        proxy_set_header X-Forwarded-Prefix /backend;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
